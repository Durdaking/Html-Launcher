<!doctype html>
<html>
<head>
  <title>Launcher</title>

  <style>
    body {
      font-family: Verdana;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 150px);
      gap: 15px;
    }

    .game-box {
      width: 150px;
      height: 150px;
      background-color: #2c2c2c;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .game-box:hover {
      background-color: #444;
    }
  </style>
</head>

<body>

<h1>Html Game Launcher</h1>

<div class="grid">
  <div class="game-box" onclick="openGame('Endless_games/asciispace.html')">Asciispace</div>
  <div class="game-box" onclick="openGame('test.html')">Test 2</div>
  <div class="game-box" onclick="openGame('test.html')">Test 3</div>
  <div class="game-box" onclick="openGame('test.html')">Test 4</div>
  <div class="game-box" onclick="openGame('test.html')">Test 5</div>
  <div class="game-box" onclick="openGame('test.html')">Test 6</div>

</div>

<script>
function openGame(path) {
  let newTab = window.open('about:blank', '_blank');
  newTab.document.write(`
    <iframe src="${path}" style="width:100%; height:100%; border:none;"></iframe>
  `);
}
</script>

</body>
</html>
